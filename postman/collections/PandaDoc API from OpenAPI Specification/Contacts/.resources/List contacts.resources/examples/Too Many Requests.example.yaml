$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/contacts?value="
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  queryParams:
    - key: value
      value: ""
      description: Optional search parameter. Filter results by exact match.
  body:
    type: text
    content: ""
