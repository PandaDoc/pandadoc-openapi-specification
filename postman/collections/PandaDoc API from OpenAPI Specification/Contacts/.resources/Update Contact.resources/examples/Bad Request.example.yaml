$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/contacts/:id"
  method: PATCH
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: id
      value: SyoufNkJiHRn24LpuJ7RXb
      description: Contact id.
  body:
    type: json
    content: |-
      {
        "first_name": "new first_name",
        "last_name": "new last_name",
        "company": "new company",
        "job_title": "new job_title",
        "phone": "new phone",
        "country": "new country",
        "state": "new state",
        "street_address": "new street_address",
        "city": "new city",
        "postal_code": "new postal_code"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "type": "validation_error",
        "detail": {
          "count": [
            "A valid integer is required."
          ],
          "order_by": [
            "value is not a valid choice."
          ]
        }
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "example": "validation_error"
          },
          "detail": {
            "type": "object",
            "example": {
              "count": [
                "A valid integer is required."
              ],
              "order_by": [
                "value is not a valid choice."
              ]
            }
          }
        }
      }
order: 2000
