$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/contacts"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "email": "user01@pandadoc.com",
        "first_name": "John",
        "last_name": "Doe",
        "company": "John Doe Inc.",
        "job_title": "CTO",
        "phone": "+14842634627",
        "country": "USA",
        "state": "Texas",
        "street_address": "1313 Mockingbird Lane",
        "city": "Austin",
        "postal_code": "75001"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "type": "validation_error",
        "detail": {
          "count": [
            "A valid integer is required."
          ],
          "order_by": [
            "value is not a valid choice."
          ]
        }
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "example": "validation_error"
          },
          "detail": {
            "type": "object",
            "example": {
              "count": [
                "A valid integer is required."
              ],
              "order_by": [
                "value is not a valid choice."
              ]
            }
          }
        }
      }
order: 2000
