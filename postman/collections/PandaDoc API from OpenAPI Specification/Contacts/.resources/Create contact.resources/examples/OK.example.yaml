$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/contacts"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "email": "user01@pandadoc.com",
        "first_name": "John",
        "last_name": "Doe",
        "company": "John Doe Inc.",
        "job_title": "CTO",
        "phone": "+14842634627",
        "country": "USA",
        "state": "Texas",
        "street_address": "1313 Mockingbird Lane",
        "city": "Austin",
        "postal_code": "75001"
      }
