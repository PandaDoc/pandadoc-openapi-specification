$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/content-library-items"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "name": "CLI name example"
      }
response:
  statusCode: 429
  statusText: Too Many Requests
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "type": "throttled",
        "detail": "Request was throttled."
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "example": "throttled"
          },
          "detail": {
            "type": "string",
            "example": "Request was throttled."
          }
        }
      }
order: 5000
