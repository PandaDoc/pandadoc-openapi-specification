$kind: http-request
description: |
  Get the list of folders that contain Templates in your account.

  > 📘 
  > 
  > The root folder is not listed in the response.

  For the full list of folder operations and their limitations, see [Organize Templates and Folders](https://developers.pandadoc.com/docs/organize-folders).
url: "{{baseUrl}}/public/v1/templates/folders?parent_uuid=Nq8htXxFssmhRxAPSP4SBP&count=50&page=1"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: parent_uuid
    value: Nq8htXxFssmhRxAPSP4SBP
    description: The UUID of the folder containing folders. To list the folders located in the root folder, remove this parameter in the request.
    $type: string
  - key: count
    value: "50"
    description: Optionally, specify how many folders to return.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "format": "int32",
            "default": 50,
            "minimum": 1,
            "maximum": 100
          }
        }
      }
  - key: page
    value: "1"
    description: Optionally, specify which page of the dataset to return.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "format": "int32",
            "minimum": 1
          }
        }
      }
body:
  type: text
  content: ""
examples: ./.resources/List Templates Folders.resources/examples
order: 4000
