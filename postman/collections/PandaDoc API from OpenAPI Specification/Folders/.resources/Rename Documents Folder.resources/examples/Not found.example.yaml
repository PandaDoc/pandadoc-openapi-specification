$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/documents/folders/:id"
  method: PUT
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: id
      value: Nq8htXxFssmhRxAPSP4SBP
      description: The UUID of the folder that you are renaming.
  body:
    type: json
    content: |-
      {
        "name": "New folder name"
      }
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "type": "request_error",
        "detail": "Not found"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "example": "request_error"
          },
          "detail": {
            "type": "string",
            "example": "Not found"
          }
        }
      }
order: 4000
