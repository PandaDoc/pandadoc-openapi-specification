$kind: http-request
description: |
  ## Create from a Markdown upload

  Upload a Markdown (`.md`) file to create a new document. The file content will be converted into a PandaDoc document.

  **Note**: A file you upload is not stored in your PandaDoc account, so you have to upload it with every request.

  > **Alpha:** Markdown file upload is currently in alpha.
  > This functionality may change or be removed without notice.
url: "{{baseUrl}}/public/v1/documents?upload-markdown"
method: POST
headers:
  Content-Type: multipart/form-data
  Accept: application/json
queryParams:
  upload-markdown: null
body:
  type: formdata
  content:
    - type: file
      key: file
      src: ""
      description: |
        The Markdown file to upload.

        Accepted content types: `text/markdown`, `text/x-markdown`.
    - type: text
      key: data
      value: "[object Object]"
      description: |
        Request body for creating a document from an uploaded Markdown file.

        > **Alpha:** Markdown file upload is currently in alpha. This functionality may change or be removed without notice.
examples: ./.resources/Create Document from Markdown File Upload.resources/examples
order: 5000
