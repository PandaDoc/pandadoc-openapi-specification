$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/documents/:id/status"
  method: PATCH
  headers:
    - key: Content-Type
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: id
      value: iGsFiaV2hEEvQdhr2WAkMk
      description: Specify document ID.
  body:
    type: json
    content: |-
      {
        "status": 12,
        "note": "Change status to Decline",
        "notify_recipients": false
      }
response:
  statusCode: 204
  statusText: No Content
  body:
    type: text
    content: ""
order: 1000
