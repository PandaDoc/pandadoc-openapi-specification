$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/documents/:id/download-protected?separate_files=false"
  method: GET
  headers:
    - key: Accept
      value: application/pdf
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  queryParams:
    - key: separate_files
      value: "false"
      description: Download document bundle as a zip-archive of separate PDFs (1 file per section).
  pathVariables:
    - key: id
      value: Mebvyy3NGsGBnY2rPLkH84
      description: Specify document ID.
  body:
    type: text
    content: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/pdf
  body:
    type: text
    content: string
    $type: |-
      {
        "type": "string",
        "format": "binary"
      }
order: 1000
