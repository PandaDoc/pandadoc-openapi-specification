$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/documents/:id/editing-sessions"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: id
      value: pSgK5XYZjyg3zXYZxsoUWg
      description: Document ID
  body:
    type: json
    content: |-
      {
        "email": "john.doe@pandadoc.com",
        "lifetime": 100
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "type": "request_error",
        "detail": {
          "lifetime": [
            "Ensure this value is greater than or equal to 60."
          ]
        }
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "example": "request_error"
          },
          "detail": {
            "type": "object",
            "example": {
              "count": [
                "A valid integer is required."
              ],
              "order_by": [
                "value is not a valid choice."
              ]
            }
          }
        }
      }
order: 2000
