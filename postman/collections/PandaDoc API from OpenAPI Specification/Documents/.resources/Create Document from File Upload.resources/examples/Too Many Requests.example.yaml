$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/documents?editor_ver=ev2&use_form_field_properties=true"
  method: POST
  headers:
    - key: Content-Type
      value: multipart/form-data
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  queryParams:
    - key: editor_ver
      value: ev2
      description: Set this parameter as `ev1` if you want to create a document from PDF with Classic Editor when both editors are enabled for the workspace.
    - key: use_form_field_properties
      value: "true"
      description: Set this parameter as `yes` or `1` or `true` (only when upload pdf with form fields) if you want to  respect form fields properties, like `required`.
  body:
    type: formdata
    content:
      - type: file
        key: file
        src: ""
        description: Binary PDF File
      - type: text
        key: data
        value: "[object Object]"
        description: ""
response:
  statusCode: 429
  statusText: Too Many Requests
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "type": "throttled",
        "detail": "Request was throttled."
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "example": "throttled"
          },
          "detail": {
            "type": "string",
            "example": "Request was throttled."
          }
        }
      }
order: 4000
