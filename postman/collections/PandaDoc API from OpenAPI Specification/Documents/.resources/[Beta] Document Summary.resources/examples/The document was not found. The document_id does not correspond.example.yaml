$kind: http-example
name: The document was not found. The document_id does not correspond to any document in the system.
request:
  url: "{{baseUrl}}/public/beta/documents/:document_id/summary?type=detailed"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  queryParams:
    - key: type
      value: detailed
      description: |
        Document summary granularity to return.
  pathVariables:
    - key: document_id
      value: D3okRfgHRX7NEhavcACReB
      description: |
        The unique identifier of the document.
  body:
    type: text
    content: ""
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": "document_not_found",
          "message": "The document was not found."
        }
      }
    $type: |-
      {
        "description": "Standard error envelope following existing API conventions.\n",
        "type": "object",
        "properties": {
          "error": {
            "type": "object",
            "description": "Error detail with a machine-readable code and a human-readable message.\n",
            "properties": {
              "code": {
                "type": "string",
                "description": "Machine-readable error code.\n"
              },
              "message": {
                "type": "string",
                "description": "Human-readable description of the error.\n"
              }
            },
            "required": [
              "code",
              "message"
            ]
          }
        },
        "required": [
          "error"
        ]
      }
order: 6000
