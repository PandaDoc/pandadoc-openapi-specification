          },
          "status": {
            "type": "string",
            "enum": [
              "document.draft",
              "document.sent",
              "document.completed",
              "document.uploaded",
              "document.error",
              "document.viewed",
              "document.waiting_approval",
              "document.approved",
              "document.rejected",
