$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/documents"
  method: POST
  headers:
    - key: Content-Type
      value: multipart/form-data
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: formdata
    content:
      - type: file
        key: file
        src: ""
        description: |
          The Markdown file to upload.

          Accepted content types: `text/markdown`, `text/x-markdown`.
      - type: text
        key: data
        value: "[object Object]"
        description: |
          Request body for creating a document from an uploaded Markdown file.

          > **Alpha:** Markdown file upload is currently in alpha. This functionality may change or be removed without notice.
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "D3okRfgHRX7NEhavcACReB",
        "name": "Document from Markdown",
        "status": "document.uploaded",
        "date_created": "2024-07-04T19:27:14.927317Z",
        "date_modified": "2024-07-04T19:27:14.927317Z",
        "expiration_date": null,
        "version": null,
        "uuid": "D3okRfgHRX7NEhavcACReB",
        "links": [
          {
            "rel": "status",
            "href": "https://api.pandadoc.com/public/v1/documents/D3okRfgHRX7NEhavcACReB",
            "type": "GET"
          }
        ],
        "info_message": "Wait until the status is changed to document.draft. You may use webhooks or poll the Document Status method."
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "id": {
            "type": "string",
            "example": "cKbJ7uay3cEGtsKuGPwYGX"
          },
