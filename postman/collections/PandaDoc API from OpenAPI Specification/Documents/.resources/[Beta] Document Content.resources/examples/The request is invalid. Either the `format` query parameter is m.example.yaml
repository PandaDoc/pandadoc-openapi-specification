$kind: http-example
name: The request is invalid. Either the `format` query parameter is missing, or its value is not one of the allowed values (plaintext, markdown).
request:
  url: "{{baseUrl}}/public/beta/documents/:document_id/content?format=plaintext"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  queryParams:
    - key: format
      value: plaintext
      description: |
        Document content representation to return.
  pathVariables:
    - key: document_id
      value: D3okRfgHRX7NEhavcACReB
      description: |
        The unique identifier of the document.
  body:
    type: text
    content: ""
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": "missing_format",
          "message": "The format query parameter is required."
        }
      }
    $type: |-
      {
        "description": "Standard error envelope following existing API conventions.\n",
        "type": "object",
        "properties": {
          "error": {
            "type": "object",
            "description": "Error detail with a machine-readable code and a human-readable message.\n",
            "properties": {
              "code": {
                "type": "string",
                "description": "Machine-readable error code.\n"
              },
              "message": {
                "type": "string",
                "description": "Human-readable description of the error.\n"
              }
            },
            "required": [
              "code",
              "message"
            ]
          }
        },
        "required": [
          "error"
        ]
      }
order: 3000
