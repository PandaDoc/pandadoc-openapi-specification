$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/documents/:id/status"
  method: PATCH
  headers:
    - key: Content-Type
      value: multipart/form-data
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: id
      value: iGsFiaV2hEEvQdhr2WAkMk
      description: Specify document ID.
  body:
    type: formdata
    content:
      - type: file
        key: file
        src: ""
        description: Binary attachment file
      - type: text
        key: data
        value: "[object Object]"
        description: JSON as a multipart/form-data string.
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "type": "request_error",
        "detail": "Not found"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "example": "request_error"
          },
          "detail": {
            "type": "string",
            "example": "Not found"
          }
        }
      }
order: 4000
