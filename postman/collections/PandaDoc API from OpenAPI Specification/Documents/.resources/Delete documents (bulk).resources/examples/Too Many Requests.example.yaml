$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/documents"
  method: DELETE
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      [
        {
          "id": "XjV64iXRJMerjSpk428QSF"
        },
        {
          "id": "6NbHUUu6uuYN2tqJvgtf9h"
        }
      ]
response:
  statusCode: 429
  statusText: Too Many Requests
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "type": "throttled",
        "detail": "Request was throttled."
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "example": "throttled"
          },
          "detail": {
            "type": "string",
            "example": "Request was throttled."
          }
        }
      }
order: 6000
