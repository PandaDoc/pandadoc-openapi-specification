$kind: http-request
description: |
  Download documents as a PDF.
url: "{{baseUrl}}/public/v1/documents/:id/download?watermark_color=%23FF5733&watermark_font_size=12&watermark_opacity=0.5&watermark_text=John Doe inc.&separate_files=false"
method: GET
headers:
  Accept: application/pdf
queryParams:
  - key: watermark_color
    value: "#FF5733"
    description: HEX code (for example `#FF5733`).
    $type: string
  - key: watermark_font_size
    value: "12"
    description: Font size of the watermark.
    $type: integer
  - key: watermark_opacity
    value: "0.5"
    description: In range 0.0-1.0
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "number",
            "format": "float"
          }
        }
      }
  - key: watermark_text
    value: John Doe inc.
    description: Specify watermark text.
    $type: string
  - key: separate_files
    value: "false"
    description: Download document bundle as a zip-archive of separate PDFs (1 file per section).
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "boolean",
            "default": false
          }
        }
      }
pathVariables:
  - key: id
    value: BhVzRcxH9Z2LgfPPGXFUBa
    description: Specify document ID.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
examples: ./.resources/Document Download.resources/examples
order: 17000
