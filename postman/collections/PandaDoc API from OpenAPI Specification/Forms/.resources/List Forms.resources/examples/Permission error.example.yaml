$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/forms?count=10&page=1&status=active&order_by=name&asc=true&name=New Form"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  queryParams:
    - key: count
      value: "10"
      description: Specify how many forms to return. Default is 50 forms, maximum is 100 forms.
    - key: page
      value: "1"
      description: Specify which page of the dataset to return.
    - key: status
      value: active
      description: Specify which status of the forms dataset to return.
    - key: order_by
      value: name
      description: Specify the form dataset order to return.
    - key: asc
      value: "true"
      description: Specify sorting the result-set in ascending or descending order.
    - key: name
      value: New Form
      description: Specify the form name.
  body:
    type: text
    content: ""
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "type": "permission_error",
        "detail": "You do not have permission to perform this action.",
        "info_message": "You are not allowed to send documents outside of your organization",
        "links": [
          {
            "rel": "status",
            "href": "https://api.pandadoc.com/public/v1/documents/RsXrKarV524iCpjci9CMGa",
            "type": "POST"
          },
          {
            "rel": "status",
            "href": "https://api.pandadoc.com/public/v1/documents/RsXrKarV524iCpjci9CMGa",
            "type": "POST"
          }
        ]
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "example": "permission_error"
          },
          "detail": {
            "type": "string",
            "example": "You do not have permission to perform this action."
          },
          "info_message": {
            "type": "string",
            "example": "You are not allowed to send documents outside of your organization",
            "description": "Human-readable explanation of the permission error."
          },
          "links": {
            "type": "array",
            "description": "Optional links related to the error (e.g. a status endpoint).",
            "items": {
              "type": "object",
              "properties": {
                "rel": {
                  "type": "string",
                  "example": "status"
                },
                "href": {
