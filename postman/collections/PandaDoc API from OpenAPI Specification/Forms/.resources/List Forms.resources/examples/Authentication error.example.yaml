$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/forms?count=10&page=1&status=active&order_by=name&asc=true&name=New Form"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  queryParams:
    - key: count
      value: "10"
      description: Specify how many forms to return. Default is 50 forms, maximum is 100 forms.
    - key: page
      value: "1"
      description: Specify which page of the dataset to return.
    - key: status
      value: active
      description: Specify which status of the forms dataset to return.
    - key: order_by
      value: name
      description: Specify the form dataset order to return.
    - key: asc
      value: "true"
      description: Specify sorting the result-set in ascending or descending order.
    - key: name
      value: New Form
      description: Specify the form name.
  body:
    type: text
    content: ""
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "type": "authentication_error",
        "detail": "Authentication credentials were not provided."
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "example": "authentication_error"
          },
          "detail": {
            "type": "string",
            "example": "Authentication credentials were not provided."
          }
        }
      }
order: 3000
