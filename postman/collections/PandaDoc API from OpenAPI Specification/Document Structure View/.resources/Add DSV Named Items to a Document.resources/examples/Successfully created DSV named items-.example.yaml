$kind: http-example
name: Successfully created DSV named items.
request:
  url: "{{baseUrl}}/public/v2/dsv/:document_id/add-named-items"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: document_id
      value: BhVzRcxH9Z2LgfPPGXFUBa
      description: Unique identifier of the document to which the DSV named items will be added.
  body:
    type: json
    content: |-
      {
        "items": [
          {
            "name": "First Section",
            "level": 0,
            "page_name": "page_name_1"
          },
          {
            "name": "Second Section",
            "level": 0,
            "page_name": "page_name_2"
          }
        ]
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "results": [
          {
            "id": "0da526b8-0535-4a5c-9913-431ed252a6f5",
            "name": "First Section",
            "level": 0,
            "page_name": "page_name_1",
            "page_uuid": "8dcc8dcc-b5bd-4431-9885-1a60e829cdaf"
          },
          {
            "id": "30dc3914-fd05-4b09-9eca-99a067b8767b",
            "name": "Second Section",
            "level": 0,
            "page_name": "page_name_2",
            "page_uuid": "4ae4e8ef-f2e8-4fe3-a47f-0833af49f31f"
          }
        ],
        "count": 2
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "results": {
            "type": "array",
            "description": "List of DSV named items that were created.",
            "items": {
              "type": "object",
              "properties": {
                "id": {
                  "type": "string",
                  "description": "Unique identifier for the created DSV item.",
                  "format": "uuid"
                },
                "name": {
                  "type": "string",
                  "description": "The display name of the item."
                },
                "level": {
                  "type": "integer",
                  "minimum": 0,
                  "description": "The hierarchy level of the item."
                },
                "page_name": {
                  "type": "string",
                  "description": "Internal reference name for the page."
                },
                "page_uuid": {
                  "type": "string",
                  "description": "UUID of the associated page.",
                  "format": "uuid"
                }
              },
              "required": [
                "id",
                "name",
                "level",
                "page_name",
                "page_uuid"
              ]
            }
          },
          "count": {
            "type": "number",
            "minimum": 0,
            "description": "Total number of items created."
          }
        },
        "required": [
          "results",
          "count"
        ]
      }
order: 1000
