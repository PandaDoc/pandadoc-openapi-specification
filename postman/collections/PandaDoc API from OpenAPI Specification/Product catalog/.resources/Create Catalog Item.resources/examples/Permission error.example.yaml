$kind: http-example
request:
  url: "{{baseUrl}}/public/v2/product-catalog/items"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "type": "regular",
        "title": "New Product",
        "category_id": null,
        "sku": "",
        "description": null,
        "price_configuration": {
          "currency": "EUR",
          "price": 1,
          "cost": null,
          "pricing_method": 0,
          "tiers": null,
          "billing_type": "one_time",
          "billing_cycle": null
        },
        "custom_fields": [],
        "images": [],
        "bundle_items": []
      }
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "forbidden"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "code": {
            "type": "string",
            "example": "forbidden"
          },
          "details": {
            "type": "array",
            "example": [],
            "items": {
              "type": "object",
              "properties": {
                "code": {
                  "type": "string"
                },
                "pointer": {
                  "type": "string",
                  "description": "JSON Pointer."
                },
                "data": {
                  "type": "object",
                  "description": "Details data."
                }
              },
              "required": [
                "code"
              ]
            }
          }
        }
      }
order: 2000
