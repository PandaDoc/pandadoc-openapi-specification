$kind: http-example
request:
  url: "{{baseUrl}}/public/v2/product-catalog/items/:item_uuid"
  method: PATCH
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: item_uuid
      value: 2e39c7e0-acb0-4ff2-b4cd-ea3141f95db8
      description: Catalog item UUID
  body:
    type: json
    content: |-
      {
        "type": "regular",
        "title": "New name",
        "category_id": null,
        "product_variant": {
          "sku": "211813881147",
          "description": "<p>New description</p>",
          "custom_fields": [
            {
              "name": "Field",
              "value": "Value"
            }
          ],
          "price_configuration": {
            "price": 99,
            "currency": "USD",
            "cost": 1,
            "pricing_method": 1,
            "tiers": [
              {
                "min_qty": 1,
                "value": 10
              },
              {
                "min_qty": 2,
                "value": 8
              }
            ],
            "billing_type": "one_time",
            "billing_cycle": null
          },
          "images": []
        },
        "bundle_items": []
      }
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "forbidden"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "code": {
            "type": "string",
            "example": "forbidden"
          },
          "details": {
            "type": "array",
            "example": [],
            "items": {
              "type": "object",
              "properties": {
                "code": {
                  "type": "string"
                },
                "pointer": {
                  "type": "string",
                  "description": "JSON Pointer."
                },
                "data": {
                  "type": "object",
                  "description": "Details data."
                }
              },
              "required": [
                "code"
              ]
            }
          }
        }
      }
order: 2000
