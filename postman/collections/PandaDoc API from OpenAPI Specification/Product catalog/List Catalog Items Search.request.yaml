$kind: http-request
description: |
  This method searches for items in your [product catalog](https://support.pandadoc.com/en/articles/9714691-product-catalog).

  Use the `query` parameter to search in title, SKU, description, category name, custom fields name and value. You can also search for items by their type, billing type, and category id.

  Order search results, in both ascending and descending order, by these item properties:

  - SKU
  - Name
  - Price
  - Modification date

  Use the `exclude_uuids` parameter to exclude particular uuids from the search request.
url: "{{baseUrl}}/public/v2/product-catalog/items/search?page=1&per_page=10&query=coffee&order_by=-date_modified&types=regular&billing_types=one_time&exclude_uuids=1725f759-3a1c-64e3-2daa-f67eafa589d7&exclude_uuids=06cb0ce9-094b-1f38-2fe6-0a9d226cd22c&category_id=06cb0ce9-094b-1f38-2fe6-0a9d226cd22c&no_category=true"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: page
    value: "1"
    description: Page number.
    $type: number
  - key: per_page
    value: "10"
    description: Items per page.
    $type: number
  - key: query
    value: coffee
    description: |
      Search query. Searches the following fields: Title, SKU, description, category name, custom fields name and value.
    $type: string
  - key: order_by
    value: -date_modified
    description: Ordering principle for displaying search results.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "enum": [
              "sku",
              "-sku",
              "title",
              "-title",
              "price",
              "-price",
              "date_modified",
              "-date_modified"
            ]
          }
        }
      }
  - key: types
    value: regular
    description: Filter by catalog item types.
    $type: array
  - key: billing_types
    value: one_time
    description: Filter by billing types.
    $type: array
  - key: exclude_uuids
    value: 1725f759-3a1c-64e3-2daa-f67eafa589d7
    description: A list of item uuids to be excluded from search.
    $type: array
  - key: exclude_uuids
    value: 06cb0ce9-094b-1f38-2fe6-0a9d226cd22c
    description: A list of item uuids to be excluded from search.
  - key: category_id
    value: 06cb0ce9-094b-1f38-2fe6-0a9d226cd22c
    description: Category id.
    $type: string
  - key: no_category
    value: "true"
    $type: boolean
body:
  type: text
  content: ""
examples: ./.resources/List Catalog Items Search.resources/examples
order: 1000
