                    "type": "string",
                    "enum": [
                      "custom",
                      "single",
                      "multiple"
                    ]
                  }
                }
              }
            }
          }
        },
        "settings": {
          "type": "object",
          "description": "Quote settings. Denotes whether a quote is optional or selected, and selection type inside the section - single, multiple, or custom.",
          "properties": {
            "selection_type": {
              "type": "string",
              "enum": [
                "custom",
                "single",
                "multiple"
              ]
            }
          }
        }
