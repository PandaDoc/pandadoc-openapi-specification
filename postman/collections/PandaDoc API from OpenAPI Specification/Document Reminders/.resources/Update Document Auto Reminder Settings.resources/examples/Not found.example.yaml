$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/documents/:document_id/auto-reminders"
  method: PATCH
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: document_id
      value: BhVzRcxH9Z2LgfPPGXFUBa
      description: The UUID of the document.
  body:
    type: json
    content: |-
      {
        "enabled": true,
        "delivery_method": "email",
        "initial_delay_days": 3,
        "is_recurring": true,
        "recurrence_frequency_days": 5
      }
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "type": "request_error",
        "detail": "Not found"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "example": "request_error"
          },
          "detail": {
            "type": "string",
            "example": "Not found"
          }
        }
      }
order: 5000
