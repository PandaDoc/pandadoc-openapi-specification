$kind: http-example
name: |-
  Returned when a manual reminder cannot be sent due to the document's current status.
  This occurs when:
    - The document has not been sent yet.
    - The document is in a final state (e.g., completed, paid, declined, or expired).
    - The document is in "suggesting mode," during which reminders are disabled.
request:
  url: "{{baseUrl}}/public/v1/documents/:document_id/send-reminder"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: document_id
      value: BhVzRcxH9Z2LgfPPGXFUBa
      description: The UUID of the document.
  body:
    type: json
    content: |-
      {
        "reminders": [
          {
            "recipient_id": "2eWSKSvVqmuVCnuUK3iWwD",
            "delivery_methods": {
              "email": true,
              "sms": false
            }
          },
          {
            "recipient_id": "7JhSDcvLQa9uR7kBX8mYeK",
            "delivery_methods": {
              "email": true,
              "sms": true
            }
          }
        ]
      }
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "mXpGsEBHdSFW97zKXq75hm",
        "status": "document.uploaded",
        "info_message": "Can't send reminder. Document is not in SENT or VIEWED statuses"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "id": {
            "type": "string",
            "example": "mXpGsEBHdSFW97zKXq75hm"
          },
          "status": {
            "type": "string",
            "example": "document.uploaded"
          },
          "info_message": {
            "type": "string",
            "example": "Can't send reminder. Document is not in SENT or VIEWED statuses"
          }
        }
      }
order: 5000
