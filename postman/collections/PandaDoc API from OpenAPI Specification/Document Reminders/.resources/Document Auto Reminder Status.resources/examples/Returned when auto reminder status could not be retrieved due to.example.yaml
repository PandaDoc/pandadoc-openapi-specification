$kind: http-example
name: |-
  Returned when auto reminder status could not be retrieved due to the document's current status or 
  reminders configuration.
  This occurs when:
    - The document has not been sent yet.
    - The document is in a final state (e.g., completed, paid, declined, or expired).
    - The auto reminders are disabled in the document settings.
request:
  url: "{{baseUrl}}/public/v1/documents/:document_id/auto-reminders/status"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: document_id
      value: BhVzRcxH9Z2LgfPPGXFUBa
      description: The UUID of the document.
  body:
    type: text
    content: ""
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "type": "request_error",
        "detail": "Can't get reminder status. Auto reminders aren't configured for this document or the document is not in SENT or VIEWED statuses"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "example": "request_error"
          },
          "detail": {
            "type": "string",
            "example": "Can't get reminder status. Auto reminders aren't configured for this document or the document is not in SENT or VIEWED statuses"
          }
        }
      }
order: 2000
