          },
          "workspace_id": {
            "type": "string",
            "example": "Nq8htXxFssmhRxAPSP4SBP"
          },
          "shared_key": {
            "type": "string",
            "example": "587c22285F57883db3ee"
          },
          "status": {
            "type": "string",
            "enum": [
              "ACTIVE",
              "INACTIVE",
              "DEACTIVATED"
            ],
            "example": "ACTIVE"
          }
        }
      }
order: 1000
