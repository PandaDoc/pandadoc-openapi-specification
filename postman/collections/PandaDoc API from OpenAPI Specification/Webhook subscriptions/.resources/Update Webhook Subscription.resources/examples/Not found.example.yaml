$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/webhook-subscriptions/:id"
  method: PATCH
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: id
      value: d173751d-0057-4d5c-ab75-49a670a4ca68
      description: Webhook subscription uuid
  body:
    type: json
    content: |-
      {
        "name": "PandaDoc",
        "url": "https://pandadoc.com/webhooks",
        "active": true,
        "payload": [
          "fields",
          "products",
          "metadata",
          "tokens",
          "pricing"
        ],
        "triggers": [
          "document_deleted",
          "recipient_completed",
          "document_updated",
          "document_state_changed",
          "document_creation_failed"
        ]
      }
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "type": "request_error",
        "detail": "Not found"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "example": "request_error"
          },
          "detail": {
            "type": "string",
            "example": "Not found"
          }
        }
      }
order: 5000
