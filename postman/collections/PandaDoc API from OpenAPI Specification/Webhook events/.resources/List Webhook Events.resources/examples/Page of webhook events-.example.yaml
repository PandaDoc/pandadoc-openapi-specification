$kind: http-example
name: Page of webhook events.
request:
  url: "{{baseUrl}}/public/v1/webhook-events?count=10&page=1&since=2022-06-01T00:00:00Z&to=2022-06-30T23:59:59Z&type=recipient_completed&http_status_code=400&error=NOT_VALID_URL"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  queryParams:
    - key: count
      value: "10"
      description: Specify how many event results to return.
    - key: page
      value: "1"
      description: Specify which page of the dataset to return.
    - key: since
      value: 2022-06-01T00:00:00Z
      description: Return results where the event creation time is greater than or equal to this value.
    - key: to
      value: 2022-06-30T23:59:59Z
      description: Return results where the event creation time is less than this value.
    - key: type
      value: recipient_completed
      description: Returns results by the specified event types.
    - key: http_status_code
      value: "400"
      description: Returns results with the specified HTTP status codes.
    - key: error
      value: NOT_VALID_URL
      description: Returns results with the following errors.
  body:
    type: text
    content: ""
