$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/templates?fields=content_date_modified"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  queryParams:
    - key: fields
      value: content_date_modified
      description: A comma-separated list of additional fields to include in the response.
  body:
    type: json
    content: |-
      {
        "name": "Sample Template",
        "folder_uuid": "EE8yUNg5HztqVAuH85He8V",
        "owner": {
          "email": "john.doe@example.com"
        },
        "metadata": {
          "my_favorite_pet": "Panda"
        }
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "type": "validation_error",
        "detail": {
          "count": [
            "A valid integer is required."
          ],
          "order_by": [
            "value is not a valid choice."
          ]
        }
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "example": "validation_error"
          },
          "detail": {
            "type": "object",
            "example": {
              "count": [
                "A valid integer is required."
              ],
              "order_by": [
                "value is not a valid choice."
              ]
            }
          }
        }
      }
order: 2000
