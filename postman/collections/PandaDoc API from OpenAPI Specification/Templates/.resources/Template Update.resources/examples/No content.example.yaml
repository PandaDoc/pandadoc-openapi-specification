$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/templates/:id"
  method: PATCH
  headers:
    - key: Content-Type
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: id
      value: BhVzRcxH9Z2LgfPPGXFUBa
      description: Template ID
  body:
    type: json
    content: |-
      {
        "tokens": [
          {
            "name": "Favorite.Pet",
            "value": "Panda"
          }
        ]
      }
response:
  statusCode: 204
  statusText: No Content
  body:
    type: text
    content: ""
order: 1000
