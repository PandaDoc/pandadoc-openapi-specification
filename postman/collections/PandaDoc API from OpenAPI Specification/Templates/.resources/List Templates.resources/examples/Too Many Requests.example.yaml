$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/templates?q=Sample onboarding template&shared=false&deleted=false&count=10&page=1&id=e9LxBesSL73AeZMzeYdfvV&folder_uuid=xDKHoJ8DkwhiTQSUzNveCJ&tag=onboarding&fields=content_date_modified"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  queryParams:
    - key: q
      value: Sample onboarding template
      description: Search query. Filter by template name.
    - key: shared
      value: "false"
      description: Returns only the shared templates.
    - key: deleted
      value: "false"
      description: Returns only the deleted templates.
    - key: count
      value: "10"
      description: Specify how many templates to return.
    - key: page
      value: "1"
      description: Specify which page of the dataset to return.
    - key: id
      value: e9LxBesSL73AeZMzeYdfvV
      description: Specify template ID.
    - key: folder_uuid
      value: xDKHoJ8DkwhiTQSUzNveCJ
      description: UUID of the folder where the templates are stored.
    - key: tag
      value: onboarding
      description: Search tag. Filter by template tag.
    - key: fields
      value: content_date_modified
      description: A comma-separated list of additional fields to include in the response.
  body:
    type: text
    content: ""
response:
  statusCode: 429
  statusText: Too Many Requests
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "type": "throttled",
        "detail": "Request was throttled."
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "example": "throttled"
          },
          "detail": {
            "type": "string",
            "example": "Request was throttled."
          }
        }
      }
order: 3000
