$kind: http-example
name: Successfully retrieved audit trail.
request:
  url: "{{baseUrl}}/public/v2/documents/:document_id/audit-trail?limit=20&offset=0"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  queryParams:
    - key: limit
      value: "20"
      description: Maximum number of items to return.
    - key: offset
      value: "0"
      description: Number of items to skip before starting to collect the result set.
  pathVariables:
    - key: document_id
      value: BhVzRcxH9Z2LgfPPGXFUBa
      description: Unique identifier of the document to retrieve the audit trail for.
  body:
    type: text
    content: ""
