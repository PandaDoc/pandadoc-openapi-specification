$kind: http-example
request:
  url: "{{baseUrl}}/public/v2/notary/notarization-requests"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "document_id": "D3okRfgHRX7NEhavcACReB",
        "disable_invitees_notifications": true,
        "invitation": {
          "message": "Your session is ready",
          "invitees": [
            {
              "email": "signer@example.com",
              "first_name": "test",
              "last_name": "test"
            }
          ]
        }
      }
response:
  statusCode: 429
  statusText: Too Many Requests
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "too_many_requests"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "code": {
            "type": "string",
            "example": "too_many_requests"
          },
          "details": {
            "type": "array",
            "example": [],
            "items": {
              "type": "object",
              "properties": {
                "code": {
                  "type": "string"
                },
                "pointer": {
                  "type": "string",
                  "description": "JSON Pointer."
                },
                "data": {
                  "type": "object",
                  "description": "Details data."
                }
              },
              "required": [
                "code"
              ]
            }
          }
        }
      }
order: 5000
