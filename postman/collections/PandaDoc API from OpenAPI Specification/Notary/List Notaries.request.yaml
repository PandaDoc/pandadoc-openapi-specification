$kind: http-request
description: |
  Retrieve a list of notaries associated with your organization.

  ## Important Notes

  - At the moment, notaries can be added to organization only manually through the PandaDoc Notary UI. 
  - Organization must have Notary addon enabled to use this endpoint
url: "{{baseUrl}}/public/v2/notary/notaries?status=ACTIVE&status=UNDER_REVIEW&commission_state=California&commission_state=Arizona&offset=0&limit=50&order_by=email"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: status
    value: ACTIVE
    description: Filter by status (comma-separated values supported). Valid values are INVITED, UNDER_REVIEW, ACTIVE, REJECTED, INACTIVE
    $type: array
  - key: status
    value: UNDER_REVIEW
    description: Filter by status (comma-separated values supported). Valid values are INVITED, UNDER_REVIEW, ACTIVE, REJECTED, INACTIVE
  - key: commission_state
    value: California
    description: Filter by commission state (comma-separated values supported)
    $type: array
  - key: commission_state
    value: Arizona
    description: Filter by commission state (comma-separated values supported)
  - key: offset
    value: "0"
    description: Number of results to skip
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "default": 0
          }
        }
      }
  - key: limit
    value: "50"
    description: Maximum number of results to return
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "default": 50,
            "maximum": 100
          }
        }
      }
  - key: order_by
    value: email
    description: Sort by name, email, or status (default is email). Use a - prefix for descending order (e.g., -email)
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "default": "email",
            "enum": [
              "email",
              "-email",
              "status",
              "-status",
              "name",
              "-name"
            ]
          }
        }
      }
body:
  type: text
  content: ""
examples: ./.resources/List Notaries.resources/examples
order: 1000
