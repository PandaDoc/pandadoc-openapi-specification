$kind: http-example
name: A list of phone numbers, their SMS current opt-out statuses and timestamp of the last change.
request:
  url: "{{baseUrl}}/public/v1/sms-opt-outs?timestamp_from=2025-01-28T00:00:00Z&timestamp_to=2025-01-28T23:59:59Z"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  queryParams:
    - key: timestamp_from
      value: 2025-01-28T00:00:00Z
      description: |
        The start of the timestamp. 

        If no timestamp is provided, 1 hour before the current time will be used.
    - key: timestamp_to
      value: 2025-01-28T23:59:59Z
      description: |
        The end of the timestamp range. 

        If no timestamp is provided the current time will be used.
  body:
    type: text
    content: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "results": [
          {
            "phone_number": "+1234567890",
            "status": "opt-out",
            "opt_out_changed": "2025-01-28T12:00:00Z"
          },
          {
            "phone_number": "+1234567891",
            "status": "opt-in",
            "opt_out_changed": "2025-01-28T12:00:00Z"
          }
        ]
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "results": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "phone_number": {
                  "type": "string",
                  "example": "+1234567890"
                },
                "status": {
                  "type": "string",
                  "enum": [
                    "opt-in",
                    "opt-out"
                  ],
                  "example": "opt-out"
                },
                "opt_out_changed": {
                  "type": "string",
                  "example": "2025-01-28T12:00:00Z",
                  "format": "date-time"
                }
              }
            }
          }
        }
      }
order: 1000
