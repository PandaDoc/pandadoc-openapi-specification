$kind: http-example
request:
  url: "{{baseUrl}}/public/v2/logs/:id"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: id
      value: AZC86i5PYKMjQjMMMw9e
      description: Log event id.
  body:
    type: text
    content: ""
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "not_found"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "code": {
            "type": "string",
            "example": "not_found"
          },
          "details": {
            "type": "array",
            "example": [],
            "items": {
              "type": "object",
              "properties": {
                "code": {
                  "type": "string"
                },
                "pointer": {
                  "type": "string",
                  "description": "JSON Pointer."
                },
                "data": {
                  "type": "object",
                  "description": "Details data."
                }
              },
              "required": [
                "code"
              ]
            }
          }
        }
      }
order: 4000
