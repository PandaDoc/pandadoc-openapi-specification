$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/members/:id"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: id
      value: radQBiBkU7MBk59NSgaGf5
      description: Membership id.
  body:
    type: text
    content: ""
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "type": "request_error",
        "detail": {
          "count": [
            "A valid integer is required."
          ],
          "order_by": [
            "value is not a valid choice."
          ]
        }
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "example": "request_error"
          },
          "detail": {
            "type": "object",
            "example": {
              "count": [
                "A valid integer is required."
              ],
              "order_by": [
                "value is not a valid choice."
              ]
            }
          }
        }
      }
order: 2000
