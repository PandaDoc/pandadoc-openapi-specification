$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/members/:member_id/token"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: member_id
      value: radQBiBkU7MBk59NSgaGf5
      description: Member id.
  body:
    type: json
    content: |-
      {
        "lifetime": 3600
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "token": "1fc7b52182405dbf004b9e9ffb555a6ac61419ba"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "token": {
            "type": "string",
            "example": "1fc7b52182405dbf004b9e9ffb555a6ac61419ba"
          }
        }
      }
order: 1000
