$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/documents/:id/fields"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: id
      value: BhVzRcxH9Z2LgfPPGXFUBa
      description: Document UUID.
  body:
    type: json
    content: |-
      {
        "fields": [
          {
            "type": "text",
            "layout": {
              "page": 1,
              "position": {
                "offset_x": 1,
                "offset_y": 1,
                "anchor_point": "topleft"
              },
              "style": {
                "width": 1,
                "height": 1
              }
            }
          }
        ]
      }
response:
  statusCode: 429
  statusText: Too Many Requests
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "type": "throttled",
        "detail": "Request was throttled."
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "example": "throttled"
          },
          "detail": {
            "type": "string",
            "example": "Request was throttled."
          }
        }
      }
order: 5000
