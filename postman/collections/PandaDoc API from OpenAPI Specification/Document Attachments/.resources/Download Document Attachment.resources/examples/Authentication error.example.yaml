$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/documents/:id/attachments/:attachment_id/download"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: id
      value: BhVzRcxH9Z2LgfPPGXFUBa
      description: Document UUID.
    - key: attachment_id
      value: 89ce2f49-10fb-4e9b-b5f3-e28be2a5c042
