  body:
    type: json
    content: |-
      {
        "type": "authentication_error",
        "detail": "Authentication credentials were not provided."
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "example": "authentication_error"
          },
          "detail": {
            "type": "string",
            "example": "Authentication credentials were not provided."
          }
        }
