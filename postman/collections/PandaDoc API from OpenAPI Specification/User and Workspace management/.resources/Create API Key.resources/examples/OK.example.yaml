$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/workspaces/:workspace_id/api-keys"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: workspace_id
      value: BhVzRcxH9Z2LgfPPGXFUBa
      description: Workspace id.
  body:
    type: json
    content: |-
      {
        "type": "production",
        "user_id": "ajnN7eGutJZsRKjQrNuPkh"
      }
