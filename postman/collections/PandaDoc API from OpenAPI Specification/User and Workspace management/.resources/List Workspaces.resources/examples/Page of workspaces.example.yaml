$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/workspaces?count=10&page=1"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  queryParams:
