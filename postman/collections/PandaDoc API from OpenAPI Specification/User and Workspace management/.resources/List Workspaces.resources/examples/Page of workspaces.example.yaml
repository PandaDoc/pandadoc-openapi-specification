            "owner": "siarhei@pandadoc.com",
            "date_created": "2022-05-14T22:22:41.255046Z"
          }
        ],
        "total": 1
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "total": {
            "type": "integer",
            "description": "A number of workspaces"
          },
          "results": {
            "type": "array",
