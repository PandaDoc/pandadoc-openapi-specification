$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/users?notify_user=true&notify_ws_admins=false"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  queryParams:
    - key: notify_user
      value: "true"
      description: Send a confirmation email to the user that was added to workspace(s).
    - key: notify_ws_admins
      value: "false"
      description: Send a confirmation email to all workspace admins indicating that the user has been added to the workspace.
  body:
    type: json
    content: |-
      {
        "user": {
          "email": "test@pandadoc.com",
          "first_name": "New",
          "last_name": "User",
          "phone_number": ""
        },
        "workspaces": [
          {
            "workspace_id": "Ab123",
            "role": "Collaborator"
          }
        ],
        "license": "Guest"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "type": "authentication_error",
        "detail": "Authentication credentials were not provided."
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "example": "authentication_error"
          },
          "detail": {
            "type": "string",
            "example": "Authentication credentials were not provided."
          }
        }
      }
order: 3000
