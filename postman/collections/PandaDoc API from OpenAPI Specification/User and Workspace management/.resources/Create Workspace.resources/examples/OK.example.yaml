$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/workspaces"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "name": "A new workspace"
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "5RdKYSewV5vMtik3CmoDMR",
        "name": "A new workspace"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "id": {
            "type": "string",
            "example": "iMymdDd9XFD3HyxP5VD67Q"
          },
          "name": {
            "type": "string",
            "example": "A new workspace"
          }
        }
      }
order: 1000
