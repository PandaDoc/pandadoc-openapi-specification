$kind: http-example
request:
  url: "{{baseUrl}}/public/v1/users?count=10&page=1&show_removed=false"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  queryParams:
    - key: count
      value: "10"
      description: Number of elements in page.
    - key: page
      value: "1"
      description: Page number.
    - key: show_removed
      value: "false"
      description: Filter option - show users with removed memberships.
  body:
    type: text
    content: ""
response:
  statusCode: 429
  statusText: Too Many Requests
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "type": "throttled",
        "detail": "Request was throttled."
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "example": "throttled"
          },
          "detail": {
            "type": "string",
            "example": "Request was throttled."
          }
        }
      }
order: 3000
