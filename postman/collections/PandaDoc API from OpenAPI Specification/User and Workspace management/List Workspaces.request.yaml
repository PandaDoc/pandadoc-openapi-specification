$kind: http-request
description: |
  Get a list of all the active workspaces in the organization.
url: "{{baseUrl}}/public/v1/workspaces?count=10&page=1"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: count
    value: "10"
    description: Number of elements in page.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "format": "int32",
            "default": 50,
            "minimum": 1,
            "maximum": 100
          }
        }
      }
  - key: page
    value: "1"
    description: Page number.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer",
            "format": "int32",
            "default": 1,
            "minimum": 1
          }
        }
      }
body:
  type: text
  content: ""
examples: ./.resources/List Workspaces.resources/examples
order: 1000
